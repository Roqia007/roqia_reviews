<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Log in</title>
    </head>
    <body>
        <header>
            <h1>Roqia's reviews</h1>
            <!-- You can't use it more than once because of the page structure-->
            <img src ="books_photos/download (1).jpg" alt ="" width ="100%" height ="400px">
             <p> <i>I rate the books I've read here.</i> </p>
             <!-- i is a html formatting command remember to search what the difference between it and em is -->
              <h2>Log in</h2>
        </header>
        <form action ="Home.html" method = "post">
            <!-- you write where the data will be transformed in the action attribute
             method => you use post if you don't want them to appear in the URL & get if you want them to appear in the URL -->
            <div class="User_name">
             <label>User Name</label>
             <input type= "text" placeholder = "Enter Your User Name" name = "User_name" required minlength="3" maxlength="8">
            </div>
             <br>
            </div> 
            <div class="Email">
             <label>Gmail</label>
             <input type = "email" placeholder = "ex: name@gmail.com" name = "email" required>
            </div>
            <br>
            <div class="Password">
             <label>Password</label>
             <input type = "password" placeholder = "Complex one" name = "Password" required minlength="6" maxlength="8">
            </div>
            <br>
            <div class="reader">
                <input type="radio" name="Role" value="Reader" id="Reader">
                <label for="Reader">Reader</label>
            </div>
            <div class="Roqia">
                <input type="radio" name="Role" value="Roqia" id="Roqia">
                <label for="Roqia">Roqia</label>
                <!-- I will be the only writer -->
            </div>
            <br>
            <input type = "submit" value = "Save">
        </form>
    </body>
</html>
